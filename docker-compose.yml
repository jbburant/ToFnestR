# =============================================================================
# docker-compose.yml — tofnestr
#
# Quick start:
#   docker-compose up          # start (builds image on first run)
#   docker-compose up --build  # rebuild after code/package changes
#   docker-compose down        # stop
#
# Data:
#   raw_data/     — place deployment folders here (read-only, never modified)
#   processed_data/ — app writes outputs here, mirroring the subfolder names
#
#   Example:
#     raw_data/DEP_2026_NB01/TOF.CSV  DHT.CSV  LOG.CSV  METADATA.TXT
#     → processed_data/DEP_2026_NB01/tof_processed.csv  bout_summary.csv  ...
#
#   Override mount paths:
#     TOFNESTR_RAW=/path/to/raw TOFNESTR_PROCESSED=/path/to/out docker compose up
# =============================================================================

services:
  tofnestr:
    build: .
    image: tofnestr:latest
    container_name: tofnestr
    platform: linux/amd64
    ports:
      - "3838:3838"
    volumes:
      # raw_data:  read-only — device CSVs, never modified by the app
      # processed_data: read-write — clean and processed outputs
      # The app preserves the subfolder name from raw_data in processed_data
      # so DEP_2026_NB01/ in raw maps to DEP_2026_NB01/ in processed.
      - ${TOFNESTR_RAW:-./raw_data}:/raw_data:ro
      - ${TOFNESTR_PROCESSED:-./processed_data}:/processed_data
    environment:
      - TOFNESTR_RAW_DIR=/raw_data
      - TOFNESTR_PROCESSED_DIR=/processed_data
    restart: unless-stopped
