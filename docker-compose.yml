# =============================================================================
# docker-compose.yml — incubeR
#
# Quick start:
#   docker-compose up          # start (builds image on first run)
#   docker-compose up --build  # rebuild after code/package changes
#   docker-compose down        # stop
#
# Data:
#   Place deployment folders inside ./data/ (gitignored).
#   They will appear under "Data" in the app's folder picker.
#   Example layout:
#     data/
#       DEP_2026_NB01/
#         TOF.CSV  DHT.CSV  LOG.CSV  METADATA.TXT
#       DEP_2026_NB02/
#         ...
# =============================================================================

services:
  incubeR:
    build: .
    image: incuber:latest
    container_name: incuber
    ports:
      - "3838:3838"
    volumes:
      # Mount your local data directory into the container.
      # Override with: INCUBER_DATA=/path/to/data docker-compose up
      - ${INCUBER_DATA:-./data}:/data:ro
    environment:
      - INCUBER_DATA_DIR=/data
    restart: unless-stopped
